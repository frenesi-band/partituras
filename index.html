<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partituras — FRENESÍ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;700;800&family=Space+Mono:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

<style>
:root {
  --c1: #a3aaae;
  --c2: #565e64;
  --c3: #333f46;
  --c4: #27323c;
  --c5: #0b1f28;
  --cream: #e8e0d4;
  --warm: #c9b99a;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--c5);
  color: var(--cream);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  cursor: crosshair;
}

/* GRAIN OVERLAY */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1000;
  opacity: 0.45;
  mix-blend-mode: overlay;
}

/* STAFF LINES — adapted from Partituras, tinted for dark bg */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 36px,
    rgba(163,170,174,0.06) 36px,
    rgba(163,170,174,0.06) 37px
  );
  pointer-events: none;
  z-index: 0;
}

#grain-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 999;
  opacity: 0.06;
}

/* ===================== NAV ===================== */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 900;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.2rem 2.5rem;
  backdrop-filter: blur(12px);
  background: rgba(11,31,40,0.7);
  border-bottom: 1px solid rgba(163,170,174,0.1);
}

.nav-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.9rem;
  letter-spacing: 0.18em;
  color: var(--cream);
  text-decoration: none;
  display: inline-block;
  width: fit-content;
  align-self: center;
  position: relative;
}

.nav-logo::after {
  content: '';
  position: absolute;
  bottom: -2px; left: 0;
  width: 0; height: 1px;
  background: var(--warm);
  transition: width 0.4s ease;
}
.nav-logo:hover::after { width: 100%; }

.nav-back {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--c1);
  text-decoration: none;
  transition: color 0.3s;
}
.nav-back:hover { color: var(--cream); }
.nav-back svg { transition: transform 0.3s; }
.nav-back:hover svg { transform: translateX(-3px); }

/* ===================== PAGE ===================== */
.page {
  position: relative;
  z-index: 1;
  max-width: 760px;
  margin: 0 auto;
  padding: 8rem 2.5rem 6rem;
}

/* ===================== HEADER ===================== */
.page-header {
  margin-bottom: 4rem;
  padding-bottom: 2rem;
  border-bottom: 1px solid rgba(163,170,174,0.15);
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 2rem;
  flex-wrap: wrap;
}

.page-header-left {}

.page-tag {
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.35em;
  color: var(--warm);
  text-transform: uppercase;
  margin-bottom: 0.8rem;
  opacity: 0;
  animation: fadeUp 0.7s ease 0.2s forwards;
}

.page-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3.5rem, 8vw, 6rem);
  line-height: 0.9;
  letter-spacing: 0.02em;
  color: var(--cream);
  opacity: 0;
  animation: fadeUp 0.8s ease 0.35s forwards;
}

.page-title span {
  color: transparent;
  -webkit-text-stroke: 1.5px var(--c1);
}

.page-subtitle {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-size: 0.95rem;
  color: var(--c2);
  margin-top: 0.8rem;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.5s forwards;
}

/* ===================== SEARCH ===================== */
.search-wrap {
  position: relative;
  margin-bottom: 2rem;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.6s forwards;
}

#search {
  width: 100%;
  padding: 0.9rem 3rem 0.9rem 1rem;
  background: rgba(163,170,174,0.04);
  border: none;
  border-bottom: 1px solid rgba(163,170,174,0.2);
  font-family: 'Space Mono', monospace;
  font-size: 0.82rem;
  color: var(--cream);
  outline: none;
  transition: border-color 0.3s, background 0.3s;
  letter-spacing: 0.05em;
}

#search::placeholder { color: var(--c2); }
#search:focus {
  border-color: var(--warm);
  background: rgba(163,170,174,0.07);
}

.search-icon {
  position: absolute;
  right: 1rem;
  top: 50%;
  transform: translateY(-50%);
  color: var(--c2);
  pointer-events: none;
  font-size: 1rem;
}

/* ===================== COUNT ===================== */
#count {
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--c2);
  margin-bottom: 0.6rem;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.7s forwards;
}

/* ===================== FILE LIST ===================== */
#file-list {
  list-style: none;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.8s forwards;
}

#file-list li {
  border-bottom: 1px solid rgba(163,170,174,0.1);
  transition: background 0.2s;
}

#file-list li:first-child {
  border-top: 1px solid rgba(163,170,174,0.1);
}

#file-list li a {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1.1rem 0.8rem;
  text-decoration: none;
  color: var(--cream);
  transition: color 0.2s, background 0.2s, padding-left 0.3s;
  position: relative;
  overflow: hidden;
}

#file-list li a::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, rgba(163,170,174,0.05), transparent);
  transform: translateX(-100%);
  transition: transform 0.35s ease;
}

#file-list li a:hover::before { transform: translateX(0); }
#file-list li a:hover {
  color: var(--warm);
  padding-left: 1.5rem;
}

.file-icon {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  color: var(--warm);
  flex-shrink: 0;
  opacity: 0.7;
  letter-spacing: 0.05em;
}

.file-name {
  flex: 1;
  font-family: 'DM Serif Display', serif;
  font-size: 1.1rem;
  line-height: 1.2;
}

.file-name-mono {
  display: block;
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  color: var(--c2);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-top: 0.2rem;
}

.file-ext {
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  color: var(--c2);
  border: 1px solid rgba(163,170,174,0.2);
  padding: 0.2rem 0.5rem;
  flex-shrink: 0;
  transition: border-color 0.2s, color 0.2s;
}

#file-list li a:hover .file-ext {
  border-color: var(--warm);
  color: var(--warm);
}

.file-arrow {
  font-size: 0.75rem;
  color: var(--c2);
  flex-shrink: 0;
  transition: transform 0.3s, color 0.2s;
}

#file-list li a:hover .file-arrow {
  transform: translateX(4px);
  color: var(--warm);
}

/* Empty / Error states */
.empty-state {
  padding: 4rem 0;
  text-align: center;
  border: 1px dashed rgba(163,170,174,0.15);
  margin-top: 1rem;
}

.empty-state-icon {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3rem;
  color: var(--c2);
  opacity: 0.3;
  display: block;
  margin-bottom: 0.5rem;
}

.empty-state p {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-size: 1rem;
  color: var(--c2);
}

.empty-state small {
  display: block;
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  color: var(--c2);
  opacity: 0.5;
  margin-top: 0.4rem;
  letter-spacing: 0.1em;
}

.error-state {
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  color: #e06060;
  padding: 1.5rem;
  border: 1px solid rgba(224,96,96,0.2);
  letter-spacing: 0.08em;
  line-height: 1.6;
}

/* ===================== ANIMATIONS ===================== */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===================== RESPONSIVE ===================== */
@media (max-width: 600px) {
  nav { padding: 1rem 1.2rem; }
  .page { padding: 6rem 1.2rem 4rem; }
  .page-title { font-size: 3.5rem; }
  .page-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
  .file-name { font-size: 0.95rem; }
}

/* ===================== MD VIEWER OVERLAY ===================== */
.md-overlay {
  position: fixed;
  inset: 0;
  z-index: 1100;
  display: flex;
  align-items: stretch;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
}

.md-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.md-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(11,31,40,0.85);
  backdrop-filter: blur(6px);
}

.md-panel {
  position: relative;
  margin: 0;
  width: 100%;
  height: 100%;
  background: var(--c4);
  transform: translateX(100%);
  transition: transform 0.4s cubic-bezier(0.77,0,0.175,1);
}

.md-overlay.open .md-panel {
  transform: translateX(0);
}

.md-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.2rem 2rem;
  border-bottom: 1px solid rgba(163,170,174,0.1);
  flex-shrink: 0;
  gap: 1rem;
}

.md-panel-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.2rem;
  letter-spacing: 0.12em;
  color: var(--cream);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.md-panel-close {
  background: none;
  border: 1px solid rgba(163,170,174,0.2);
  color: var(--c1);
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  padding: 0.4rem 0.9rem;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.2s;
  flex-shrink: 0;
}

.md-panel-close:hover {
  border-color: var(--cream);
  color: var(--cream);
}

.md-panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 2.5rem 2rem 4rem;
  scrollbar-width: thin;
  scrollbar-color: var(--c3) transparent;
}

.md-panel-body::-webkit-scrollbar { width: 4px; }
.md-panel-body::-webkit-scrollbar-track { background: transparent; }
.md-panel-body::-webkit-scrollbar-thumb { background: var(--c3); }

/* Loading state */
.md-loading {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  color: var(--c2);
  letter-spacing: 0.15em;
  padding: 2rem 0;
}

.md-loading-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--warm);
  animation: blink 1.2s ease-in-out infinite;
}
.md-loading-dot:nth-child(2) { animation-delay: 0.2s; }
.md-loading-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 1; }
}

/* Rendered markdown styles */
.md-content { color: var(--cream); line-height: 1.8; }

.md-content h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3rem;
  letter-spacing: 0.05em;
  line-height: 1;
  color: var(--cream);
  margin-bottom: 1.5rem;
  padding-bottom: 0.8rem;
  border-bottom: 1px solid rgba(163,170,174,0.15);
}

.md-content h2 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.5rem;
  color: var(--cream);
  margin: 2.5rem 0 1rem;
}

.md-content h3 {
  font-family: 'Syne', sans-serif;
  font-size: 0.9rem;
  font-weight: 800;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--warm);
  margin: 2rem 0 0.8rem;
}

.md-content p {
  font-family: 'Syne', sans-serif;
  font-size: 0.95rem;
  color: var(--c1);
  margin-bottom: 1.2rem;
}

.md-content strong { color: var(--cream); font-weight: 700; }

.md-content em {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  color: var(--warm);
}

.md-content code {
  font-family: 'Space Mono', monospace;
  font-size: 0.8rem;
  background: rgba(163,170,174,0.08);
  padding: 0.15em 0.4em;
  color: var(--warm);
}

.md-content pre {
  background: rgba(11,31,40,0.6);
  border: 1px solid rgba(163,170,174,0.1);
  padding: 1.2rem;
  overflow-x: auto;
  margin: 1.5rem 0;
}

.md-content pre code {
  background: none;
  padding: 0;
  font-size: 0.82rem;
  color: var(--c1);
}

.md-content ul, .md-content ol {
  padding-left: 1.5rem;
  margin-bottom: 1.2rem;
  color: var(--c1);
  font-size: 0.95rem;
}

.md-content li { margin-bottom: 0.4rem; }

.md-content blockquote {
  border-left: 2px solid var(--warm);
  padding-left: 1.2rem;
  margin: 1.5rem 0;
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  color: var(--c1);
}

.md-content hr {
  border: none;
  border-top: 1px solid rgba(163,170,174,0.12);
  margin: 2rem 0;
}

.md-content a {
  color: var(--warm);
  text-decoration: underline;
  text-underline-offset: 3px;
}

.md-content table {
  width: 100%;
  border-collapse: collapse;
  margin: 1.5rem 0;
  font-size: 0.85rem;
}

.md-content th {
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--warm);
  border-bottom: 1px solid rgba(163,170,174,0.2);
  padding: 0.6rem 0.8rem;
  text-align: left;
}

.md-content td {
  padding: 0.6rem 0.8rem;
  border-bottom: 1px solid rgba(163,170,174,0.07);
  color: var(--c1);
}

@media (max-width: 600px) {
  .md-panel-body { padding: 1.5rem 1.2rem 3rem; }
  .md-content h1 { font-size: 2rem; }
}
</style>
</head>
<body>

<canvas id="grain-canvas"></canvas>

<!-- NAV -->
<nav>
  <span class="nav-logo">FRENESÍ</span>
  <a href="index.html" class="nav-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Volver
  </a>
</nav>

<!-- PAGE -->
<div class="page">

  <header class="page-header">
    <div class="page-header-left">
      <p class="page-tag">— Archivo / FRENESÍ</p>
      <h1 class="page-title">PARTI<span>TU</span>RAS</h1>
    </div>
  </header>

  <div class="search-wrap">
    <input type="text" id="search" placeholder="Buscar partitura…" autocomplete="off" spellcheck="false">
    <span class="search-icon">𝄞</span>
  </div>

  <div id="count"></div>
  <ul id="file-list"></ul>

</div>

<!-- MD VIEWER OVERLAY -->
<div class="md-overlay" id="md-overlay">
  <div class="md-backdrop" id="md-backdrop"></div>
  <div class="md-panel">
    <div class="md-panel-header">
      <span class="md-panel-title" id="md-panel-title">—</span>
      <button class="md-panel-close" id="md-panel-close">✕ Cerrar</button>
    </div>
    <div class="md-panel-body" id="md-panel-body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
/* ---- GRAIN CANVAS ---- */
const canvas = document.getElementById('grain-canvas');
const ctx = canvas.getContext('2d');
let w, h;

function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
function generateNoise() {
  const imageData = ctx.createImageData(w, h);
  const data = imageData.data;
  for (let i = 0; i < data.length; i += 4) {
    const v = Math.random() * 255 | 0;
    data[i] = v; data[i+1] = v; data[i+2] = v;
    data[i+3] = Math.random() * 28 | 0;
  }
  ctx.putImageData(imageData, 0, 0);
}
function animateGrain() { generateNoise(); requestAnimationFrame(animateGrain); }
window.addEventListener('resize', resize);
resize();
animateGrain();

/* ---- MD VIEWER ---- */
const overlay    = document.getElementById('md-overlay');
const backdrop   = document.getElementById('md-backdrop');
const panelTitle = document.getElementById('md-panel-title');
const panelBody  = document.getElementById('md-panel-body');
const closeBtn   = document.getElementById('md-panel-close');

function openMd(file, dir) {
  panelTitle.textContent = titleCase(basename(file));
  panelBody.innerHTML = `<div class="md-loading"><div class="md-loading-dot"></div><div class="md-loading-dot"></div><div class="md-loading-dot"></div></div>`;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  fetch(dir + file)
    .then(r => { if (!r.ok) throw new Error('No se pudo cargar el archivo'); return r.text(); })
    .then(text => {
      panelBody.innerHTML = `<div class="md-content">${marked.parse(text)}</div>`;
      panelBody.scrollTop = 0;
    })
    .catch(err => {
      panelBody.innerHTML = `<div class="error-state">⚠ ${err.message}</div>`;
    });
}

function closeMd() {
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

closeBtn.addEventListener('click', closeMd);
backdrop.addEventListener('click', closeMd);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMd(); });

/* ---- FILE LOGIC ---- */
const MD_DIR = 'src/';

// ← Añadí tus archivos .md aquí
const FILES = [
  'corderos.md',
  // 'bach-invencion-1.md',
  // 'beethoven-op27-n2.md',
];

const list    = document.getElementById('file-list');
const countEl = document.getElementById('count');
const search  = document.getElementById('search');

function basename(name) {
  return name.replace(/\.md$/i, '').replace(/[-_]/g, ' ');
}

function titleCase(str) {
  return str.replace(/\w\S*/g, t => t.charAt(0).toUpperCase() + t.slice(1).toLowerCase());
}

function render(files) {
  const q = search.value.trim().toLowerCase();
  const filtered = q ? files.filter(f => f.toLowerCase().includes(q)) : files;

  countEl.textContent = `${filtered.length} partitura${filtered.length !== 1 ? 's' : ''}`;
  list.innerHTML = '';

  if (!filtered.length) {
    list.innerHTML = `
      <li>
        <div class="empty-state">
          <span class="empty-state-icon">𝄽</span>
          <p>${q ? `Sin resultados para "${q}"` : 'No se encontraron archivos .md en /src'}</p>
          ${q ? `<small>Intentá con otro término</small>` : ''}
        </div>
      </li>`;
    return;
  }

  filtered.forEach(file => {
    const li = document.createElement('li');
    const a  = document.createElement('a');
    a.href   = encodeURI(file);
    a.innerHTML = `
      <span class="file-icon">𝄞</span>
      <span class="file-name">
        ${titleCase(basename(file))}
        <span class="file-name-mono">${file}</span>
      </span>
      <span class="file-ext">MD</span>
      <span class="file-arrow">→</span>
    `;
    li.appendChild(a);
    list.appendChild(li);
  });
}

async function fetchFromServer() {
  try {
    const res = await fetch(MD_DIR);
    if (!res.ok) throw new Error('No se pudo leer el directorio');
    const html = await res.text();
    const doc  = new DOMParser().parseFromString(html, 'text/html');
    const links = [...doc.querySelectorAll('a[href]')]
      .map(a => a.getAttribute('href'))
      .filter(h => h.toLowerCase().endsWith('.md'))
      .map(h => h.split('/').pop());
    render(links);
    search.addEventListener('input', () => render(links));
  } catch (e) {
    list.innerHTML = `<li><div class="error-state">⚠ ${e.message}<br>Verificá que tu servidor permita listar /src o usá la lista manual en el script.</div></li>`;
    countEl.textContent = '';
  }
}

if (FILES.length) {
  render(FILES);
  search.addEventListener('input', () => render(FILES));
} else {
  fetchFromServer();
  search.addEventListener('input', () => fetchFromServer());
}
</script>
</body>
</html>
