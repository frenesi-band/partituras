<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vista de Markdown — FRENESÍ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;700;800&family=Space+Mono:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
<style>
:root {
  --c1: #a3aaae;
  --c2: #565e64;
  --c3: #333f46;
  --c4: #27323c;
  --c5: #0b1f28;
  --cream: #e8e0d4;
  --warm: #c9b99a;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  --bg-body: var(--c5);
  --text-body: var(--cream);
  --nav-bg: rgba(11,31,40,0.85);
  --nav-border: rgba(163,170,174,0.1);
  --title-color: var(--cream);
  --divider-color: rgba(163,170,174,0.25);
  --md-text: var(--c1);
  --md-heading: var(--cream);
  --md-subheading: var(--warm);
  --code-bg: rgba(163,170,174,0.08);
  --pre-bg: rgba(11,31,40,0.6);
  --pre-border: rgba(163,170,174,0.1);
  --link-color: var(--warm);
  --error-color: #f2a39f;
  --stripe-color: rgba(163,170,174,0.06);
  min-height: 100vh;
  background: var(--bg-body);
  color: var(--text-body);
  font-family: 'Syne', sans-serif;
}
body.theme-light {
  --bg-body: #f6f2ea;
  --text-body: #1b242b;
  --nav-bg: rgba(246,242,234,0.88);
  --nav-border: rgba(39,50,60,0.18);
  --title-color: #1b242b;
  --divider-color: rgba(39,50,60,0.25);
  --md-text: #2e3942;
  --md-heading: #121a20;
  --md-subheading: #4b5e6b;
  --code-bg: rgba(39,50,60,0.08);
  --pre-bg: rgba(39,50,60,0.08);
  --pre-border: rgba(39,50,60,0.2);
  --link-color: #1d4f76;
  --error-color: #b3423a;
  --stripe-color: rgba(39,50,60,0.08);
}
body.contrast-high {
  --bg-body: #000000;
  --text-body: #ffffff;
  --nav-bg: rgba(0,0,0,0.96);
  --nav-border: rgba(255,255,255,0.45);
  --title-color: #ffffff;
  --divider-color: rgba(255,255,255,0.5);
  --md-text: #ffffff;
  --md-heading: #ffffff;
  --md-subheading: #ffe680;
  --code-bg: rgba(255,255,255,0.18);
  --pre-bg: rgba(255,255,255,0.08);
  --pre-border: rgba(255,255,255,0.5);
  --link-color: #6fdcff;
  --error-color: #ff8d8d;
  --stripe-color: rgba(255,255,255,0.09);
}
body.theme-light.contrast-high {
  --bg-body: #ffffff;
  --text-body: #000000;
  --nav-bg: rgba(255,255,255,0.96);
  --nav-border: rgba(0,0,0,0.45);
  --title-color: #000000;
  --divider-color: rgba(0,0,0,0.5);
  --md-text: #000000;
  --md-heading: #000000;
  --md-subheading: #8a4f00;
  --code-bg: rgba(0,0,0,0.12);
  --pre-bg: rgba(0,0,0,0.08);
  --pre-border: rgba(0,0,0,0.5);
  --link-color: #003ea8;
  --error-color: #b20000;
  --stripe-color: rgba(0,0,0,0.09);
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.45;
  mix-blend-mode: overlay;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 36px,
    var(--stripe-color) 36px,
    var(--stripe-color) 37px
  );
  pointer-events: none;
  z-index: 0;
}
body.contrast-high::after {
  display: none;
}
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  padding: 1rem 2rem;
  background: var(--nav-bg);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--nav-border);
}
.nav-back {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  letter-spacing: 0.18em;
  color: var(--md-text);
  text-decoration: none;
  text-transform: uppercase;
}
.nav-back:hover { color: var(--title-color); }
.nav-back svg { transition: transform 0.3s; }
.nav-back:hover svg { transform: translateX(-3px); }
.nav-controls {
  display: inline-flex;
  align-items: center;
  gap: 0.9rem;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.switch-control {
  display: inline-flex;
  align-items: center;
  gap: 0.55rem;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  font-size: 0.82rem;
  color: var(--md-text);
}
.switch-control input {
  position: absolute;
  opacity: 0;
  pointer-events: none;
}
.switch-ui {
  width: 2.25rem;
  height: 1.25rem;
  border-radius: 999px;
  border: 1px solid var(--nav-border);
  background: rgba(127,127,127,0.2);
  position: relative;
  transition: background 0.25s ease, border-color 0.25s ease;
}
.switch-ui::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 0.85rem;
  height: 0.85rem;
  border-radius: 50%;
  background: var(--title-color);
  transition: transform 0.25s ease, background 0.25s ease;
}
.switch-control input:checked + .switch-ui {
  background: var(--link-color);
  border-color: var(--link-color);
}
.switch-control input:checked + .switch-ui::after {
  transform: translateX(1rem);
}
.switch-control input:focus-visible + .switch-ui {
  outline: 2px solid var(--link-color);
  outline-offset: 2px;
}
.page {
  position: relative;
  z-index: 1;
  max-width: none;
  width: 100%;
  margin: 0 auto;
  padding: 8rem 2.5rem 6rem;
}
.page-header {
  margin-bottom: 2rem;
}
.page-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2.5rem, 6vw, 4rem);
  letter-spacing: 0.03em;
  color: var(--title-color);
  margin-bottom: 0.75rem;
}
.page-divider {
  border: none;
  height: 1px;
  background: var(--divider-color);
  margin: 0;
  width: 100%;
}
.md-body {
  background: transparent;
  border: none;
  border-radius: 0;
  padding: 2.5rem 0 0 0;
  box-shadow: none;
}
.error-state {
  font-family: 'Space Mono', monospace;
  font-size: 0.95rem;
  color: var(--error-color);
  line-height: 1.7;
}
.md-content { color: var(--md-heading); line-height: 1.85; }
.md-content h1,
.md-content h2,
.md-content h3 {
  margin-top: 2rem;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
}
.md-content h1 {
  font-size: 2.1rem;
  letter-spacing: 0.01em;
  color: var(--md-heading);
  border-bottom: 1px solid rgba(163,170,174,0.15);
  padding-bottom: 0.8rem;
}
.md-content h2 {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--md-heading);
}
.md-content h3 {
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.02em;
  color: var(--md-subheading);
  text-transform: none;
}
.md-content p,
.md-content li,
.md-content td,
.md-content th {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  color: var(--md-text);
}
.md-content p { margin-bottom: 1.25rem; }
.md-content code {
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
  font-size: 0.9rem;
  background: var(--code-bg);
  padding: 0.15em 0.4em;
  color: var(--md-subheading);
}
.md-content pre {
  background: var(--pre-bg);
  border: 1px solid var(--pre-border);
  padding: 1.2rem;
  overflow-x: auto;
  margin: 1.5rem 0;
}
.md-content blockquote {
  border-left: 2px solid var(--md-subheading);
  padding-left: 1.2rem;
  margin: 1.5rem 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  font-style: normal;
  color: var(--md-text);
}
.md-content a {
  color: var(--link-color);
  text-decoration: underline;
}
@media (max-width: 680px) {
  .page { padding: 6rem 1.2rem 4rem; }
  .page-title { font-size: 2.5rem; }
  nav { padding: 0.9rem 1rem; }
  .nav-controls { gap: 0.55rem; }
  .switch-control { font-size: 0.75rem; }
}
.page-subtitle {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  font-size: 1.1rem;
  color: var(--md-subheading);
  margin-bottom: 0.5rem;
  margin-top: 0.2rem;
  letter-spacing: 0.01em;
}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Volver
  </a>
  <div class="nav-controls" aria-label="Opciones de visualizacion">
    <label class="switch-control" for="theme-toggle">
      <input id="theme-toggle" type="checkbox" role="switch" aria-label="Modo claro">
      <span class="switch-ui" aria-hidden="true"></span>
      Claro
    </label>
    <label class="switch-control" for="contrast-toggle">
      <input id="contrast-toggle" type="checkbox" role="switch" aria-label="Alto contraste">
      <span class="switch-ui" aria-hidden="true"></span>
      Contraste +
    </label>
  </div>
</nav>
<main class="page">
  <header class="page-header">
    <h1 class="page-title" id="page-title">Cargando…</h1>
    <hr class="page-divider">
  </header>
  <div id="md-container" class="md-body"></div>
  <style id="split-md-style"></style>
</main>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
<script>
function getQueryParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}
function titleCase(str) {
  return str.replace(/\w\S*/g, t => t.charAt(0).toUpperCase() + t.slice(1).toLowerCase());
}
function showError(message) {
  const container = document.getElementById('md-container');
  const title = document.getElementById('page-title');
  title.textContent = 'Error';
  container.innerHTML = `<div class="error-state">⚠ ${message}</div>`;
}

function setTheme(isLight) {
  document.body.classList.toggle('theme-light', isLight);
  try {
    localStorage.setItem('viewer-theme-light', isLight ? '1' : '0');
  } catch (_) {
    // ignore storage errors in restricted contexts
  }
}

function setHighContrast(isHigh) {
  document.body.classList.toggle('contrast-high', isHigh);
  try {
    localStorage.setItem('viewer-contrast-high', isHigh ? '1' : '0');
  } catch (_) {
    // ignore storage errors in restricted contexts
  }
}

function initAccessibilityToggles() {
  const themeToggle = document.getElementById('theme-toggle');
  const contrastToggle = document.getElementById('contrast-toggle');
  if (!themeToggle || !contrastToggle) return;

  let savedLight = '0';
  let savedContrast = '0';
  try {
    savedLight = localStorage.getItem('viewer-theme-light') || '0';
    savedContrast = localStorage.getItem('viewer-contrast-high') || '0';
  } catch (_) {
    // ignore storage errors in restricted contexts
  }

  const isLight = savedLight === '1';
  const isHigh = savedContrast === '1';
  themeToggle.checked = isLight;
  contrastToggle.checked = isHigh;
  setTheme(isLight);
  setHighContrast(isHigh);

  themeToggle.addEventListener('change', event => {
    setTheme(Boolean(event.target.checked));
  });
  contrastToggle.addEventListener('change', event => {
    setHighContrast(Boolean(event.target.checked));
  });
}

initAccessibilityToggles();

const file = getQueryParam('file');
if (!file || !/\.md$/i.test(file)) {
  showError('No se especificó un archivo Markdown válido en la URL.');
} else {
  const title = document.getElementById('page-title');
  title.textContent = titleCase(file.replace(/\.md$/i, '').replace(/[-_]/g, ' '));
  const container = document.getElementById('md-container');
  container.innerHTML = '<p class="error-state">Cargando markdown…</p>';

  function loadWithXHR(url) {
    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('GET', url);
      xhr.onload = () => {
        if (xhr.status === 200 || xhr.status === 0) {
          resolve(xhr.responseText);
        } else {
          reject(new Error('No se pudo cargar el archivo (XHR).'));
        }
      };
      xhr.onerror = () => reject(new Error('No se pudo cargar el archivo (XHR).'));
      xhr.send();
    });
  }

  function fetchText(url) {
    return fetch(url).then(response => {
      if (!response.ok) throw new Error('No se pudo cargar el archivo.');
      return response.text();
    }).catch(error => {
      if (window.location.protocol === 'file:' || error.message.includes('NetworkError') || error.message === 'Failed to fetch') {
        return loadWithXHR(url);
      }
      throw error;
    });
  }

  function renderMath(container) {
    if (typeof renderMathInElement !== 'function') return;
    renderMathInElement(container, {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '\\[', right: '\\]', display: true },
        { left: '$', right: '$', display: false },
        { left: '\\(', right: '\\)', display: false }
      ],
      throwOnError: false,
      errorColor: '#f2a39f'
    });
  }

  fetchText('src/' + file)
    .then(text => {
      // Get the first line as subtitle
      const lines = text.split(/\r?\n/);
      const firstLine = lines.length > 0 ? lines[0] : '';
      // Work on content without the first line (used as subtitle)
      const contentLines = lines.slice(1);
      // Split into as many near-equal parts as width allows, using blank lines as split points
      const blankIndices = [];
      for (let i = 0; i < contentLines.length; ++i) {
        if (/^\s*$/.test(contentLines[i])) blankIndices.push(i);
      }
      const minColumnWidth = 280;
      const maxByWidth = Math.max(1, Math.floor(window.innerWidth / minColumnWidth));
      const desiredParts = Math.min(maxByWidth, blankIndices.length + 1);
      const splitPoints = [];
      let prevSplit = -1;
      for (let k = 1; k < desiredParts; ++k) {
        const target = Math.floor((contentLines.length * k) / desiredParts);
        let bestIndex = -1;
        let bestDistance = Number.POSITIVE_INFINITY;
        for (let j = 0; j < blankIndices.length; ++j) {
          const idx = blankIndices[j];
          if (idx <= prevSplit) continue;
          const distance = Math.abs(idx - target);
          if (distance < bestDistance) {
            bestDistance = distance;
            bestIndex = idx;
          }
        }
        if (bestIndex === -1) break;
        splitPoints.push(bestIndex);
        prevSplit = bestIndex;
      }
      const parts = [];
      let start = 0;
      for (let i = 0; i < splitPoints.length; ++i) {
        const end = splitPoints[i];
        const part = contentLines.slice(start, end).join('\n').trim();
        if (part) parts.push(part);
        start = end + 1;
      }
      const lastPart = contentLines.slice(start).join('\n').trim();
      if (lastPart) parts.push(lastPart);
      if (parts.length === 0) parts.push('');
      const columnsHtml = parts.map((part, index) => `<div class="md-col md-col-${index + 1}">${marked.parse(part)}</div>`).join('');
      // Responsive two-column layout
      const container = document.getElementById('md-container');
      container.innerHTML = `
        <div class="md-content md-split" style="--md-cols: ${parts.length};">
          ${columnsHtml}
        </div>
      `;
      // Add subtitle under the page title
      const header = document.querySelector('.page-header');
      if (header && !header.querySelector('.page-subtitle')) {
        const subtitle = document.createElement('div');
        subtitle.className = 'page-subtitle';
        subtitle.innerHTML = marked.parseInline(firstLine);
        header.insertBefore(subtitle, header.querySelector('.page-divider'));
        // Render KaTeX in subtitle
        if (typeof renderMathInElement === 'function') {
          renderMathInElement(subtitle, {
            delimiters: [
              { left: '$$', right: '$$', display: true },
              { left: '\\[', right: '\\]', display: true },
              { left: '$', right: '$', display: false },
              { left: '\\(', right: '\\)', display: false }
            ],
            throwOnError: false,
            errorColor: '#f2a39f'
          });
        }
      }
      // Add responsive CSS for split view
      document.getElementById('split-md-style').textContent = `
        .md-split {
          display: grid;
          grid-template-columns: repeat(var(--md-cols, 1), minmax(0, 1fr));
          gap: 2.5rem;
        }
        .md-col {
          min-width: 0;
        }
        @media (max-width: 600px) {
          .md-split {
            grid-template-columns: 1fr;
            gap: 0;
          }
          .md-col {
            margin-bottom: 2.5rem;
          }
        }
      `;
      renderMath(container);
      window.scrollTo(0, 0);
    })
    .catch(error => {
      if (window.location.protocol === 'file:') {
        showError('El navegador está bloqueando el acceso a archivos locales. Abre el proyecto desde un servidor local (por ejemplo, python -m http.server o npx http-server) y vuelve a cargar la página.');
      } else {
        showError(error.message);
      }
    });
}
</script>
</body>
</html>
